name: build ruleset

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: curl -fsSL https://sing-box.app/install.sh | sh

      - name: build ruleset
        run: cd $GITHUB_WORKSPACE/momo && sing-box rule-set compile --output reject.srs ./reject.json

      - name: Upload and Overwrite Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/momo/reject.srs
          tag_name: latest
          overwrite: true
          body: ${{ github.event.inputs.packages }}
